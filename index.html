<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Flashcards N3</title>
  <script type="module" crossorigin src="/flashcard-n3-vite/assets/index-D8t3K1ao.js"></script>
  <link rel="stylesheet" crossorigin href="/flashcard-n3-vite/assets/index-Dya43IaU.css">
</head>

<body>
  <main class="app">
    <section class="main-panel">
      <h2>📚 Flashcards N3</h2>

      <div class="stats">
        <div>เหลือ <b id="remainCount">0</b> คำ</div>
        <div>ทายแล้ว <b id="guessedCount">0</b> คำ</div>
      </div>

      <div class="category-box">
        <label>
          <input type="radio" name="category" value="vocab" checked />
          คำศัพท์
        </label>

        <label>
          <input type="radio" name="category" value="grammar" />
          ไวยากรณ์
        </label>
      </div>

      <div class="mode-box">
        <label>
          <input type="radio" name="mode" value="jp-to-meaning" checked />
          JP → TH/EN
        </label>

        <label>
          <input type="radio" name="mode" value="meaning-to-jp" />
          TH/EN → JP
        </label>

        <label>
          <input type="radio" name="mode" value="reading-to-jp" />
          Hiragana → JP
        </label>
      </div>

      <div class="card" id="question">Loading...</div>

      <div id="answer"></div>

      <div class="buttons">
        <button class="show" id="showBtn">Show</button>
        <button class="next" id="nextBtn">ทายแล้ว</button>
        <button class="skip" id="skipBtn">Skip</button>
        <button class="restart" id="restartBtn">Restart</button>
        <div class="controls">


  <!-- mode selector -->
  <div class="controls__row controls__row--select">
    <label class="select-label">โหมดการฝึก</label>
    <select id="exerciseMode" class="select">
      <option value="jp-to-meaning">ญี่ปุ่น → ให้ทายความหมาย</option>
      <option value="reading-to-jp">ฮิรางานะ → ให้ทายคำญี่ปุ่น</option>
      <option value="meaning-to-jp">ไทย/อังกฤษ → ให้ทายคำญี่ปุ่น</option>
      <option value="mixed">ผสมทั้งหมด</option>
    </select>
  </div>

  <!-- secondary actions -->
  <div class="controls__row controls__row--secondary">
    <button class="btn btn-download" id="downloadExerciseBtn">
      📄 ดาวน์โหลดแบบฝึกหัดทั้งหมด
    </button>

    <button class="btn btn-history" id="historyToggleBtn">
      ✅ ดูคำที่ทายไปแล้ว
    </button>
  </div>

</div>


      </div>

    </section>

    <aside class="history-panel hidden" id="historyPanel">
      <div class="history-content" id="historyContent">
        <h3>✅ คำที่ทายไปแล้ว</h3>
        <div id="guessedList"></div>
      </div>
    </aside>
  </main>

</body>

</html>
